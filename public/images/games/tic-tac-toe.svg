<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad-tic-tac-toe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070712" />
      <stop offset="50%" stop-color="#0f0e21" />
      <stop offset="100%" stop-color="#04040a" />
    </linearGradient>
    <linearGradient id="glow-grad-tic-tac-toe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Deep Velvet Space Background -->
  <rect width="512" height="512" fill="url(#bg-grad-tic-tac-toe)" />

  <!-- Radial lighting corona -->
  <circle cx="256" cy="220" r="230" fill="url(#glow-grad-tic-tac-toe)" filter="blur(36px)" />
  <circle cx="256" cy="220" r="115" fill="#7c3aed" fill-opacity="0.18" filter="blur(48px)" />

  <!-- Dedicated Procedural Grid Background -->
  
        <rect x="25" y="25" width="462" height="410" fill="#1e1e2f" rx="16" />
      

  <!-- Extremely fine, premium border frames -->
  <rect x="18" y="18" width="476" height="476" rx="34" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-opacity="0.18" />
  <rect x="22" y="22" width="468" height="468" rx="30" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.06" />

  <!-- Detached High-Fidelity Custom Theme Art Core -->
  
        <g transform="translate(256, 210)">
          <!-- Glowing neon game grid board lines -->
          <g stroke="#ffffff" stroke-width="6.5" opacity="0.15" stroke-linecap="round">
             <line x1="-120" y1="-40" x2="120" y2="-40" />
             <line x1="-120" y1="40" x2="120" y2="40" />
             <line x1="-40" y1="-120" x2="-40" y2="120" />
             <line x1="40" y1="-120" x2="40" y2="120" />
          </g>

          <!-- Vibrant Cyan X character -->
          <g transform="translate(-80, -80)" stroke="#06b6d4" stroke-width="12" stroke-linecap="round" filter="drop-shadow(0 0 6px #06b6d4)">
             <line x1="-24" y1="-24" x2="24" y2="24" />
             <line x1="24" y1="-24" x2="-24" y2="24" />
          </g>
          <g transform="translate(80, 80)" stroke="#06b6d4" stroke-width="12" stroke-linecap="round" filter="drop-shadow(0 0 6px #06b6d4)">
             <line x1="-24" y1="-24" x2="24" y2="24" />
             <line x1="24" y1="-24" x2="-24" y2="24" />
          </g>

          <!-- Gorgeous hot-pink O circles -->
          <g transform="translate(80, -80)">
             <circle cx="0" cy="0" r="28" fill="none" stroke="#ec4899" stroke-width="12" filter="drop-shadow(0 0 6px #ec4899)" />
          </g>
          <g transform="translate(-80, 80)">
             <circle cx="0" cy="0" r="28" fill="none" stroke="#ec4899" stroke-width="12" filter="drop-shadow(0 0 6px #ec4899)" />
          </g>
          
          <g transform="translate(0, 0)">
             <circle cx="0" cy="0" r="28" fill="none" stroke="#ec4899" stroke-width="12" filter="drop-shadow(0 0 6px #ec4899)" />
          </g>

          <!-- Winning stroke line intersecting diagonally -->
          <line x1="-135" y1="135" x2="135" y2="-135" stroke="#ef4444" stroke-width="7" stroke-linecap="round" filter="drop-shadow(0 0 8px #ef4444)" />
        </g>
      

  <!-- Ambient Bottom Shadow Blend to maximize overlaying HTML text readabilities -->
  <rect x="18" y="290" width="476" height="204" fill="url(#vignette-tic-tac-toe)" rx="34" style="mix-blend-mode: multiply;" />
  <defs>
    <linearGradient id="vignette-tic-tac-toe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="50%" stop-color="#000000" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.98" />
    </linearGradient>
  </defs>
</svg>