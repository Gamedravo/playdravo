<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad-little-alchemy-clone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070712" />
      <stop offset="50%" stop-color="#0f0e21" />
      <stop offset="100%" stop-color="#04040a" />
    </linearGradient>
    <linearGradient id="glow-grad-little-alchemy-clone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Deep Velvet Space Background -->
  <rect width="512" height="512" fill="url(#bg-grad-little-alchemy-clone)" />

  <!-- Radial lighting corona -->
  <circle cx="256" cy="220" r="230" fill="url(#glow-grad-little-alchemy-clone)" filter="blur(36px)" />
  <circle cx="256" cy="220" r="115" fill="#06b6d4" fill-opacity="0.18" filter="blur(48px)" />

  <!-- Dedicated Procedural Grid Background -->
  
          <pattern id="puz-dot-little-alchemy-clone" width="20" height="20" patternUnits="userSpaceOnUse">
             <circle cx="10" cy="10" r="1.3" fill="#ffffff" fill-opacity="0.06" />
          </pattern>
          <rect width="512" height="512" fill="url(#puz-dot-little-alchemy-clone)" />
        

  <!-- Extremely fine, premium border frames -->
  <rect x="18" y="18" width="476" height="476" rx="34" fill="none" stroke="#10b981" stroke-width="2.5" stroke-opacity="0.18" />
  <rect x="22" y="22" width="468" height="468" rx="30" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.06" />

  <!-- Detached High-Fidelity Custom Theme Art Core -->
  
          <g transform="translate(256, 205)">
            <!-- Interleaved colored transparent gears / blocks -->
            <rect x="-85" y="-85" width="110" height="110" rx="20" fill="#10b981" fill-opacity="0.4" stroke="#10b981" stroke-width="4" />
            <rect x="-25" y="-25" width="110" height="110" rx="20" fill="#06b6d4" fill-opacity="0.5" stroke="#06b6d4" stroke-width="4" />
            
            <!-- Connecting circuit tracks -->
            <g stroke="#ffffff" stroke-width="2.5" opacity="0.75" fill="none" stroke-linecap="round">
               <path d="M -85,-85 L 85,85" stroke-dasharray="8,6" />
               <circle cx="-85" cy="-85" r="8" fill="#ffffff" />
               <circle cx="85" cy="85" r="8" fill="#10b981" />
            </g>
          </g>
        

  <!-- Ambient Bottom Shadow Blend to maximize overlaying HTML text readabilities -->
  <rect x="18" y="290" width="476" height="204" fill="url(#vignette-little-alchemy-clone)" rx="34" style="mix-blend-mode: multiply;" />
  <defs>
    <linearGradient id="vignette-little-alchemy-clone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="50%" stop-color="#000000" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.98" />
    </linearGradient>
  </defs>
</svg>