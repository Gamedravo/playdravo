<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Elegant Gradient matching GameDravo branding -->
    <linearGradient id="violet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <!-- Rounded premium backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#violet-grad)" />
  
  <!-- Sleek neon border -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="#f4f4f5" stroke-width="14" stroke-opacity="0.12" />

  <!-- GameDravo Gamepad Symbol -->
  <g transform="translate(106, 126)" fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <!-- Controller Outer Outline -->
    <path d="M40 130 C40 75, 110 45, 150 45 C190 45, 260 75, 260 130 L260 175 C260 210, 220 235, 180 220 L120 195 L120 195 L60 220 C20 235, -20 210, -20 175 Z" fill="none" stroke="#ffffff" stroke-width="28" />
    
    <!-- Left D-Pad -->
    <path d="M35 130 H75" stroke-width="22" stroke-linecap="round" />
    <path d="M55 110 V150" stroke-width="22" stroke-linecap="round" />
    
    <!-- Right Action Buttons -->
    <circle cx="178" cy="115" r="11" fill="#ffffff" stroke="none" />
    <circle cx="208" cy="145" r="11" fill="#ffffff" stroke="none" />
    <circle cx="163" cy="145" r="11" fill="#ffffff" stroke="none" />
    <circle cx="193" cy="115" r="11" fill="#ffffff" stroke="none" />
    
    <!-- Central Menu Pill Buttons -->
    <line x1="110" y1="125" x2="130" y2="125" stroke-width="16" stroke-linecap="round" />
    <line x1="110" y1="145" x2="130" y2="145" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
