    <script>
      // Early runtime patch for window.fetch setter compatibility in sandboxed secure environments
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchValue;
            },
            set: function(val) {
              fetchValue = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Unable to patch window.fetch setter descriptor:", e);
        }
      })();
    </script>
